name: Test Issue Watch

on:
  push:
    branches: [add-watcher]
  workflow_dispatch:
    inputs:
      issue:
        description: "YouTrack Issue ID"
        default: "JTST-102"
      logins:
        description: "Comma-separated YouTrack logins"
        default: "Stefan.Hölzl"

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Add watcher
        env:
          ISSUE: ${{ inputs.issue || 'JTST-102' }}
          LOGINS: ${{ inputs.logins || 'Stefan.Hölzl' }}
        run: |
          python youtrack.py \
            --base-url="${{ vars.YOUTRACK_URL }}" \
            --token="${{ secrets.YOUTRACK_TOKEN }}" \
            issue-watch \
            --issue="$ISSUE" \
            --logins="$LOGINS"
